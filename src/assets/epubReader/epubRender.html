<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
    />

    <!-- <script src="https://unpkg.com/epubjs/dist/epub.min.js"></script> -->
    <script src="epub.min.js"></script>

    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        overflow: hidden;
        background-color: #ffffff;
      }

      #viewer {
        height: 100%;
        width: 100%;
      }
    </style>
  </head>

  <body>
    <div id="viewer"></div>

    <script>
      let book = null;
      let rendition = null;
      let currentFontSize = 100;

      /* ==============================
         MESSAGE LISTENER (iOS + Android)
      ============================== */
      function receiveMessage(event) {
        try {
          const data = JSON.parse(event.data);

          if (data.type === 'LOAD_BOOK') {
            loadBook(data.url, data.location);
          }

          if (data.type === 'SET_FONT_SIZE') {
            setFontSize(data.size);
          }

          if (data.type === 'NEXT_PAGE') {
            rendition && rendition.next();
          }

          if (data.type === 'PREV_PAGE') {
            rendition && rendition.prev();
          }
        } catch (err) {
          console.error('Message parsing error:', err);
        }
      }

      document.addEventListener('message', receiveMessage);
      window.addEventListener('message', receiveMessage);

      /* ==============================
         LOAD BOOK
      ============================== */
      function loadBook(url, location) {
        console.log('Loading EPUB:', url);

        if (!url) {
          console.error('No EPUB URL provided');
          return;
        }

        try {
          book = ePub(url);

          book.opened.catch(err => {
            console.error('EPUB failed to open:', err);
          });

          rendition = book.renderTo('viewer', {
            width: '100%',
            height: '100%',
            spread: 'none',
            allowScriptedContent: true,
          });

          book.ready
            .then(() => book.locations.generate(1000))
            .then(() => {
              if (location) {
                return rendition.display(location);
              } else {
                return rendition.display();
              }
            })
            .then(() => {
              rendition.themes.fontSize(currentFontSize + '%');

              // Track progress
              rendition.on('relocated', function (loc) {
                try {
                  const percentage = book.locations.percentageFromCfi(
                    loc.start.cfi,
                  );

                  window.ReactNativeWebView &&
                    window.ReactNativeWebView.postMessage(
                      JSON.stringify({
                        type: 'PROGRESS',
                        progress: Math.floor(percentage * 100),
                        location: loc.start.cfi,
                      }),
                    );
                } catch (err) {
                  console.error('Progress tracking error:', err);
                }
              });
            });
        } catch (err) {
          console.error('EPUB render error:', err);
        }
      }

      /* ==============================
         FONT SIZE CONTROL
      ============================== */
      function setFontSize(size) {
        currentFontSize = size;

        if (rendition) {
          rendition.themes.fontSize(size + '%');
        }
      }
    </script>
  </body>
</html>
